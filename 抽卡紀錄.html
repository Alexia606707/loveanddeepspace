<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>戀與深空 抽卡紀錄總覽</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        :root {
            --bg-dark: #0c0e1a;
            --bg-card: rgba(255,255,255,0.035);
            --border: rgba(255,255,255,0.07);
            --accent: #a78bfa;
            --blue: #60a5fa;
            --green: #6ee7b7;
            --red: #fca5a5;
            --yellow: #fbbf24;
            --orange: #fb923c;
            --pink: #f9a8d4;
            --text: #e0e0e0;
            --text-dim: #7c8aaa;
        }
        body {
            font-family: 'Microsoft JhengHei','Segoe UI',system-ui,sans-serif;
            background: linear-gradient(135deg, #0c0e1a 0%, #1a1040 40%, #0d1f3c 100%);
            min-height: 100vh; padding: 30px 16px; color: var(--text);
        }
        .container { max-width: 1100px; margin: 0 auto; }

        /* ===== 標題 ===== */
        .hero {
            text-align:center; margin-bottom:40px; padding:32px 24px 26px;
            background: linear-gradient(135deg, rgba(167,139,250,.08) 0%, rgba(96,165,250,.06) 50%, rgba(249,168,212,.08) 100%);
            border:1px solid rgba(167,139,250,.2);
            border-radius:18px;
            position:relative;
            overflow:hidden;
        }
        .hero::before {
            content:''; position:absolute; top:0; left:0; right:0; height:3px;
            background: linear-gradient(90deg, #a78bfa, #60a5fa, #f9a8d4, #a78bfa);
            background-size:300% auto;
            animation: shimmer 4s linear infinite;
        }
        .hero::after {
            content:''; position:absolute; bottom:0; left:0; right:0; height:3px;
            background: linear-gradient(90deg, #f9a8d4, #60a5fa, #a78bfa, #f9a8d4);
            background-size:300% auto;
            animation: shimmer 4s linear infinite;
        }
        .hero h1 {
            font-size:2.6em; letter-spacing:6px; margin-bottom:4px;
            background: linear-gradient(90deg,#a78bfa,#60a5fa,#f9a8d4,#a78bfa);
            background-size:300% auto;
            -webkit-background-clip:text; -webkit-text-fill-color:transparent;
            animation: shimmer 4s linear infinite;
            text-shadow: 0 0 40px rgba(167,139,250,.3);
            filter: drop-shadow(0 0 12px rgba(167,139,250,.15));
        }
        .hero .sub { color:var(--text-dim); margin-top:8px; font-size:.9em; letter-spacing:3px; }
        @keyframes shimmer { 0%{background-position:0% center} 100%{background-position:300% center} }

        /* ===== 總覽卡片 ===== */
        .stats-grid {
            display:grid; grid-template-columns:repeat(auto-fit,minmax(155px,1fr));
            gap:14px; margin-bottom:30px;
        }
        .stat-box {
            background:var(--bg-card); border:1px solid var(--border);
            border-radius:14px; padding:18px 14px; text-align:center;
            transition: transform .2s;
            display:flex; flex-direction:column; align-items:center; justify-content:center;
            overflow:visible;
        }
        .stat-box:hover { transform:translateY(-2px); }
        .stat-box .label { font-size:.75em; color:var(--text-dim); margin-bottom:6px; letter-spacing:1px; }
        .stat-box .val { font-size:1.5em; font-weight:800; }
        .stat-box .note { font-size:.7em; color:var(--text-dim); margin-top:4px; white-space:nowrap; }
        .dia-gift-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:14px; }

        /* ===== 區塊共用 ===== */
        .section { margin-bottom:40px; }
        .section-title {
            font-size:1.25em; font-weight:700; color:var(--accent);
            margin-bottom:18px; margin-top:12px; padding:10px 16px;
            border-left:4px solid var(--accent);
            /* background:rgba(167,139,250,.06); */
            background:rgba(22,20,50,.85); backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
            border-radius:0 8px 8px 0;
            cursor:pointer; user-select:none;
            letter-spacing:2px;
            display:flex; align-items:center;
            position:sticky; top:0; z-index:20;
        }
        .section-title .arrow { margin-left:auto; }

        /* ===== 圖表 ===== */
        .chart-wrap {
            background:var(--bg-card); border:1px solid var(--border);
            border-radius:14px; padding:20px; margin-bottom:18px;
            position:relative; width:100%; min-width:0; overflow:hidden;
        }

        /* ===== 角色分析 ===== */
        .char-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:14px; }
        .char-card {
            background:var(--bg-card); border:1px solid var(--border);
            border-radius:14px; padding:18px; text-align:center;
        }
        .char-card .icon { font-size:1.6em; margin-bottom:6px; }
        .char-card .name { font-size:1em; font-weight:700; margin-bottom:10px; }
        .char-card .row { display:flex; justify-content:space-between; font-size:.82em; padding:3px 0; border-bottom:1px solid rgba(255,255,255,.03); }
        .char-card .row:last-child { border:none; }
        .char-card .row .k { color:var(--text-dim); }

        /* ===== 卡池明細 ===== */
        .banner-card {
            background:var(--bg-card); border:1px solid var(--border);
            border-radius:14px; padding:22px 24px; margin-bottom:16px;
            transition: transform .15s;
        }
        .banner-card:hover { transform:translateY(-1px); }
        .banner-hd { display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:6px; margin-bottom:12px; }
        .banner-name { font-size:1.08em; font-weight:700; color:#c4b5fd; }
        .banner-date { font-size:.8em; color:var(--text-dim); background:rgba(100,140,255,.08); padding:3px 12px; border-radius:16px; }
        .banner-tags { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:14px; }
        .tag { font-size:.76em; padding:3px 10px; border-radius:5px; background:rgba(167,139,250,.1); border:1px solid rgba(167,139,250,.15); color:#d4c4ff; }
        .tag.partner { background:rgba(250,180,100,.1); border-color:rgba(250,180,100,.2); color:#fcd9a0; }
        .tag.skip { background:rgba(250,100,100,.1); border-color:rgba(250,100,100,.2); color:#fca5a5; }

        table.pull-tbl { width:100%; border-collapse:separate; border-spacing:0; border-radius:10px; overflow:hidden; border:1px solid var(--border); margin-bottom:10px; }
        .pull-tbl th { background:rgba(100,120,255,.08); padding:9px 10px; font-size:.78em; color:#a5b4fc; letter-spacing:.5px; text-align:center; border-bottom:1px solid var(--border); }
        .pull-tbl td { padding:8px 10px; font-size:.84em; text-align:center; border-bottom:1px solid rgba(255,255,255,.02); }
        .pull-tbl tr:last-child td { border:none; }
        .pull-tbl tr:hover td { background:rgba(167,139,250,.04); }
        .pull-tbl .left { text-align:left; }
        .c-blue { color:var(--blue); font-weight:600; }
        .c-green { color:var(--green); font-weight:700; }
        .c-red { color:var(--red); font-weight:700; }
        .c-yellow { color:var(--yellow); font-weight:700; }
        .c-dim { color:var(--text-dim); }

        .gift-bar {
            display:flex; justify-content:space-between; align-items:center;
            background:rgba(250,200,100,.04); border:1px solid rgba(250,200,100,.08);
            border-radius:8px; padding:8px 16px; font-size:.82em;
        }
        .gift-bar .lbl { color:#c9a96e; }
        .gift-bar .amt { color:var(--yellow); font-weight:700; }

        .banner-summary {
            display:flex; gap:14px; flex-wrap:wrap; margin-top:10px;
        }
        .banner-summary .chip {
            font-size:.78em; padding:4px 12px; border-radius:8px;
            background:rgba(100,140,255,.06); border:1px solid rgba(100,140,255,.1);
        }

        /* ===== 成本排行 ===== */
        .rank-tbl { width:100%; border-collapse:separate; border-spacing:0; border-radius:10px; overflow:hidden; border:1px solid var(--border); }
        .rank-tbl th { background:rgba(100,120,255,.08); padding:10px 12px; font-size:.8em; color:#a5b4fc; text-align:center; border-bottom:1px solid var(--border); }
        .rank-tbl td { padding:9px 12px; font-size:.85em; text-align:center; border-bottom:1px solid rgba(255,255,255,.02); }
        .rank-tbl tr:hover td { background:rgba(167,139,250,.04); }
        .rank-tbl .left { text-align:left; }
        .badge { display:inline-block; padding:2px 8px; border-radius:4px; font-size:.75em; font-weight:600; }
        .badge-lucky { background:rgba(110,231,183,.12); color:#6ee7b7; }
        .badge-unlucky { background:rgba(252,165,165,.12); color:#fca5a5; }

        /* ===== 篩選 ===== */
        .filter-bar { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:16px; }
        .filter-btn {
            font-size:.8em; padding:5px 14px; border-radius:20px; cursor:pointer;
            background:rgba(255,255,255,.05); border:1px solid var(--border); color:var(--text-dim);
            transition: all .2s;
        }
        .filter-btn:hover, .filter-btn.active { background:rgba(167,139,250,.15); border-color:var(--accent); color:var(--accent); }
        .chart-range-btn { background:#1a1735; }
        .chart-range-btn:hover, .chart-range-btn.active { background:rgba(167,139,250,.25); }
        input[type="date"]::-webkit-calendar-picker-indicator { filter:invert(1); }

        /* ===== RWD ===== */
        .mob-br { display:none; }
        @media(max-width:700px){
            .mob-br { display:inline; }
            .hero h1 { font-size:1.6em; }
            .hero { padding:24px 16px 20px; }
            .stats-grid { grid-template-columns:repeat(2,1fr); }
            .dia-gift-outer { grid-template-columns:1fr !important; }
            .dia-gift-grid { grid-template-columns:repeat(2,1fr); }
            .banner-card { padding:14px 12px; }
            .pull-tbl th,.pull-tbl td { padding:6px 5px; font-size:.72em; }
        }
        @media(max-width:450px){
            .stats-grid { grid-template-columns:repeat(2,1fr); gap:8px; }
            .dia-gift-grid { grid-template-columns:repeat(2,1fr); }
            .stat-box .val { font-size:1.2em; }
            .stat-box .note { white-space:normal; }
        }

        /* 回到頂端 */
        .back-top {
            position:fixed; bottom:24px; right:24px; width:42px; height:42px;
            border-radius:50%; background:rgba(167,139,250,.25); border:1px solid var(--accent);
            color:var(--accent); font-size:1.2em; cursor:pointer; display:none;
            align-items:center; justify-content:center; z-index:99; backdrop-filter:blur(6px);
        }
        .back-top.show { display:flex; }

        /* 開關 */
        .toggle-wrap { display:inline-flex; align-items:center; gap:8px; margin-left:14px; font-size:.78em; color:var(--text-dim); vertical-align:middle; }
        .toggle-switch {
            position:relative; width:36px; height:20px; background:rgba(255,255,255,.1);
            border-radius:10px; cursor:pointer; transition: background .2s; border:1px solid rgba(255,255,255,.1);
        }
        .toggle-switch.on { background:rgba(167,139,250,.4); border-color:var(--accent); }
        .toggle-switch::after {
            content:''; position:absolute; top:2px; left:2px; width:14px; height:14px;
            background:#fff; border-radius:50%; transition: transform .2s;
        }
        .toggle-switch.on::after { transform:translateX(16px); }
    </style>
</head>
<body>
<div class="container" id="app"></div>
<button class="back-top" id="btnTop">↑</button>

<!-- 載入外部資料檔 -->
<script src="data.js"></script>
<script>
// ============================
// 資料定義已移至 data.js
// 新增卡池請使用 admin.html 管理後台
// 或直接編輯 data.js
// ============================

// ============================
// 計算引擎
// ============================
// 【分類規則】
//   目標卡 = 不是 std 也不是 extra 的卡（你真正要抽的卡）
//   常駐卡 = std:true 的卡（抽卡過程中順便出的常駐池角色）
//   加抽   = extra:true 的卡（拿衣服、拍照動作等額外花費）
//   → 加抽的「抽數」和「鑽石」都歸入目標計算
//   → 常駐 = 總 - 目標（用減法確保相加一致）
//
// 【幾抽出（delta）計算規則】
//   delta = 這張卡的累計抽數(at) - 上一張卡的累計抽數(prevAt)
//   雙蛋黃第二張：delta = 0（兩張同一抽出的）
//   開盒子：delta = 0（不用額外抽數，從盒子選的）
//
// 【鑽石歸屬】
//   每張卡的 dia 就是那批抽數實際花的鑽石
//   目標鑽石(totalTargetDia) = 目標卡 dia + 加抽 dia
//   常駐鑽石(totalStdDia) = 總鑽石 - 目標鑽石（用減法確保一致）
//
// 【禮包歸屬】
//   禮包是按整個卡池買的，無法精確拆分到每張卡
//   → 卡池內按目標卡數均分（每張目標卡分到 gift/bTargetCards）
//   → 總覽的目標/常駐拆分：按卡片數比例均分
//     totalTargetGift = totalGift × 目標卡數 ÷ 全部卡數
//     totalStdGift = totalGift - totalTargetGift
//
// 【角色歸類】
//   用 icon 判斷角色：⭐️沈星回、🍐黎深、🐟祁煜、🐦‍⬛秦徹、🍎夏以晝
//   目標卡 → charMap[角色].cards / pulls / dia / gift
//   常駐卡 → charMap[角色].stdCards / stdDia / stdPulls
//   開關「包含常駐」時會把兩邊加起來
//
function compute(){
    // --- 全域累計 ---
    let totalPulls=0;        // 總抽數（所有卡池的最大累計抽數加總）
    let totalDia=0;          // 總鑽石（所有 pull 的 dia 加總）
    let totalGift=0;         // 總禮包（所有卡池的 gift 加總）
    let totalCards=0;        // 目標卡總數
    let totalStd=0;          // 常駐卡總數
    let totalTargetPulls=0;  // 目標抽數（目標卡+加抽的 delta 加總）
    let totalBanners=0;      // 卡池期數（排除 skip 的）
    let totalTargetDia=0;    // 目標鑽石（目標卡+加抽的 dia 加總）
    let totalStdDia=0;       // 常駐鑽石（常駐卡的 dia 加總，最後會用減法修正）
    let targetCards=[];      // 每張目標卡的詳細資料（用於歐非排行）
    let charMap={};          // 角色統計（按 icon 歸類）
    let bannerStats=[];      // 每池卡池統計
    // let luckyList=[], costlyList=[];
    let dblYolks=0;          // 雙蛋黃次數
    let boxes=0;             // 開盒子次數

    // icon → 角色名對照
    const charNames = {
        '⭐️':'沈星回','🍐':'黎深','🐟':'祁煜','🐦‍⬛':'秦徹','🍎':'夏以晝'
    };

    banners.forEach((b,bi)=>{
        if(b.skip) return; // 忘記抽的卡池跳過
        totalBanners++;
        let bPulls = b.pulls.length ? Math.max(...b.pulls.map(p=>p.at)) : 0; // 該期總抽數 = 最後一筆的累計抽數
        let bDia = b.pulls.reduce((s,p)=>s+p.dia,0); // 該期總鑽石 = 所有 pull 的 dia 加總
        totalPulls += bPulls;
        totalDia += bDia;
        totalGift += b.gift;

        // --- 該期累計 ---
        let bTargetCards=0, bStdCards=0, bTargetPulls=0, bTargetDia=0, bStdDia=0;
        let prevAt=0; // 上一張卡的累計抽數，用於計算 delta

        b.pulls.forEach((p,pi)=>{
            // 雙蛋黃判斷：同一抽數出兩張，第二張 delta=0
            if(p.dbl && pi>0 && b.pulls[pi-1].at===p.at) {
                dblYolks++;
            }
            if(p.box) boxes++;

            // === 常駐卡 ===
            if(p.std) {
                totalStd++;
                bStdCards++;
                totalStdDia += p.dia;
                bStdDia += p.dia;
                // 常駐也歸類到角色（用 icon 判斷）
                let stdCharKey = charNames[p.icon] || '其他';
                if(!charMap[stdCharKey]) charMap[stdCharKey]={icon:p.icon,cards:0,pulls:0,dia:0,gift:0,stdCards:0,stdDia:0,stdPulls:0,list:[]};
                if(!charMap[stdCharKey].stdCards) { charMap[stdCharKey].stdCards=0; charMap[stdCharKey].stdDia=0; charMap[stdCharKey].stdPulls=0; }
                charMap[stdCharKey].stdCards++;
                charMap[stdCharKey].stdDia += p.dia;
                let sDelta = p.dbl && pi>0 && b.pulls[pi-1].at===p.at ? 0 : p.at - prevAt;
                charMap[stdCharKey].stdPulls += sDelta;
            }

            // === 加抽（拿衣服、拍照等）→ 抽數和鑽石歸入目標 ===
            if(p.extra){
                totalTargetDia += p.dia;
                bTargetDia += p.dia;
                let eDelta = p.dbl && pi>0 && b.pulls[pi-1].at===p.at ? 0 : p.at - prevAt;
                totalTargetPulls += eDelta;
            }

            // === 目標卡 ===
            if(!p.std && !p.extra){
                totalCards++;
                bTargetCards++;
                totalTargetDia += p.dia;
                bTargetDia += p.dia;
                // delta = 這張卡花了幾抽（雙蛋黃第二張=0，開盒子=0）
                let delta = p.dbl && pi>0 && b.pulls[pi-1].at===p.at ? 0 : (p.box ? 0 : p.at - prevAt);
                if(!p.box) bTargetPulls += delta;
                totalTargetPulls += delta;

                // 角色歸類（用 icon 判斷）
                let charKey = charNames[p.icon] || '其他';
                if(!charMap[charKey]) charMap[charKey]={icon:p.icon,cards:0,pulls:0,dia:0,gift:0,stdCards:0,stdDia:0,stdPulls:0,list:[]};
                charMap[charKey].cards++;
                charMap[charKey].pulls += delta;
                charMap[charKey].dia += p.dia;
                charMap[charKey].list.push({name:p.n, pulls:delta, dia:p.dia, banner:b.name, box:p.box, dbl:p.dbl});

                // 存到 targetCards（歐非排行用）
                targetCards.push({
                    name:p.n, icon:p.icon, pulls:delta, dia:p.dia, gift:0,
                    banner:b.name, date:b.date, box:!!p.box, dbl:!!p.dbl
                });
            }
            // 更新 prevAt（雙蛋黃第二張不更新）
            if(!p.dbl || pi===0 || b.pulls[pi-1].at!==p.at) prevAt=p.at;
        });

        // === 禮包分配 ===
        // 禮包按該期目標卡數均分，每張目標卡分到 gift/bTargetCards
        if(b.gift>0 && bTargetCards>0){
            let giftPerCard = Math.round(b.gift / bTargetCards);
            // 補到 targetCards（歐非排行顯示用）
            for(let ti=targetCards.length-bTargetCards; ti<targetCards.length; ti++){
                targetCards[ti].gift = giftPerCard;
            }
            // 補到 charMap（角色分析顯示用）
            let charCount = {};
            b.pulls.forEach(p=>{
                if(!p.std && !p.extra){
                    let ck = charNames[p.icon] || '其他';
                    charCount[ck] = (charCount[ck]||0) + 1;
                }
            });
            Object.keys(charCount).forEach(ck=>{
                if(charMap[ck]) charMap[ck].gift += giftPerCard * charCount[ck];
            });
        }

        // === 每池卡池統計 ===
        bannerStats.push({
            idx:bi, date:b.date, name:b.name, tag:b.tag, type:b.type,
            pulls:bPulls,              // 該期總抽數
            dia:bDia,                  // 該期總鑽石
            gift:b.gift,               // 該期禮包
            cards:bTargetCards,        // 該期目標卡數
            stdCards:bStdCards,        // 該期常駐卡數
            bTargetDia:bTargetDia,     // 該期目標鑽石（含加抽）
            bStdDia:bStdDia,           // 該期常駐鑽石
            // 單卡鑽石 = 該期鑽石 ÷ 卡數
            costPerCard: (bTargetCards+bStdCards)? Math.round(bDia/(bTargetCards+bStdCards)):0,        // 全部
            costPerTarget: bTargetCards? Math.round(bTargetDia/bTargetCards):0,                        // 僅目標
            costPerStd: bStdCards? Math.round(bStdDia/bStdCards):0,                                   // 僅常駐
            // 單卡禮包 = 該期禮包 ÷ 卡數（禮包無法精確拆分，均分）
            giftPerCard: (bTargetCards+bStdCards)? Math.round(b.gift/(bTargetCards+bStdCards)):0,      // 全部
            giftPerTarget: bTargetCards? Math.round(b.gift/bTargetCards):0,                            // 僅目標
            giftPerStd: bStdCards? Math.round(b.gift/bStdCards):0,                                    // 僅常駐
            // 平均抽數/張 = 該期抽數 ÷ 卡數
            pullsPerCard: (bTargetCards+bStdCards)? Math.round(bPulls/(bTargetCards+bStdCards)):0,     // 全部
            pullsPerTarget: bTargetCards? Math.round(bTargetPulls/bTargetCards):0,                     // 僅目標
            pullsPerStd: bStdCards? Math.round((bPulls-bTargetPulls)/bStdCards):0,                    // 僅常駐
        });
    });

    // === 全域平均計算 ===

    // 常駐 = 總 - 目標（用減法確保 目標+常駐=總 一定成立）
    let totalStdPulls = totalPulls - totalTargetPulls;
    totalStdDia = totalDia - totalTargetDia;

    // 平均幾抽出一張 = 總抽數 ÷ 卡數
    let avgPullsPerCard = (totalCards+totalStd) ? Math.round(totalPulls/(totalCards+totalStd)) : 0;  // 全部
    let avgTargetPulls = totalCards ? Math.round(totalTargetPulls/totalCards) : 0;                    // 僅目標
    let avgStdPulls = totalStd ? Math.round(totalStdPulls/totalStd) : 0;                             // 僅常駐

    // 單卡平均鑽石 = 總鑽石 ÷ 卡數（目標鑽石含加抽）
    let avgDiaPerCard = (totalCards+totalStd) ? Math.round(totalDia/(totalCards+totalStd)) : 0;      // 全部
    let avgDiaPerTarget = totalCards ? Math.round(totalTargetDia/totalCards) : 0;                     // 僅目標
    let avgDiaPerStd = totalStd ? Math.round(totalStdDia/totalStd) : 0;                              // 僅常駐
    let avgDiaPerPull = totalPulls ? Math.round(totalDia/totalPulls*100)/100 : 0;                    // 每抽平均鑽石

    // 禮包拆分：按卡片數比例均分（目標+常駐=總 用減法確保一致）
    let totalTargetGift = (totalCards+totalStd) ? Math.round(totalGift * totalCards / (totalCards+totalStd)) : 0;
    let totalStdGift = totalGift - totalTargetGift;
    // 單卡平均禮包 = 總禮包 ÷ 卡數
    let avgGiftPerCard = (totalCards+totalStd) ? Math.round(totalGift/(totalCards+totalStd)) : 0;    // 全部
    let avgGiftPerTarget = totalCards ? Math.round(totalTargetGift/totalCards) : 0;                   // 僅目標
    let avgGiftPerStd = totalStd ? Math.round(totalStdGift/totalStd) : 0;                            // 僅常駐
    let avgGiftPerPull = totalPulls ? Math.round(totalGift/totalPulls*100)/100 : 0;                  // 每抽平均禮包
    let avgGiftPerBanner = totalBanners ? Math.round(totalGift/totalBanners) : 0;                    // 每池平均禮包
    let avgDiaPerBanner = totalBanners ? Math.round(totalDia/totalBanners) : 0;                      // 每池平均鑽石

    // === 每月平均計算 ===
    // 用每個卡池起始日期的年月來統計有幾個不同月份
    let monthSet = new Set();
    bannerStats.forEach(b => {
        let dateStr = b.date.split('-')[0]; // 取起始日期，如 '2025/7/3'
        let parts = dateStr.split('/');
        let ym = parts[0] + '/' + parts[1]; // '2025/7'
        monthSet.add(ym);
    });
    let totalMonths = monthSet.size || 1;
    let avgDiaPerMonth = Math.round(totalDia / totalMonths);                                         // 每月平均鑽石
    let avgGiftPerMonth = Math.round(totalGift / totalMonths);                                       // 每月平均禮包
    let avgPullsPerMonth = Math.round(totalPulls / totalMonths);                                     // 每月平均抽數
    let avgCardsPerMonth = Math.round((totalCards + totalStd) * 100 / totalMonths) / 100;            // 每月平均卡數
    let freeCards = targetCards.filter(c=>c.dia===0).length;
    let maxDiaVal = Math.max(...bannerStats.map(b=>b.dia));
    let maxDiaBanners = bannerStats.filter(b=>b.dia===maxDiaVal);
    let minDiaVal = Math.min(...bannerStats.filter(b=>b.pulls>0).map(b=>b.dia));
    let minDiaBanners = bannerStats.filter(b=>b.pulls>0 && b.dia===minDiaVal);
    let maxGiftVal = Math.max(...bannerStats.map(b=>b.gift));
    let maxGiftBanners = bannerStats.filter(b=>b.gift===maxGiftVal);
    let minGiftVal = Math.min(...bannerStats.filter(b=>b.pulls>0).map(b=>b.gift));
    let minGiftBanners = bannerStats.filter(b=>b.pulls>0 && b.gift===minGiftVal);
    return {totalPulls,totalDia,totalGift,totalCards,totalStd,totalStdPulls,totalTargetPulls,
            totalTargetDia,totalStdDia,totalTargetGift,totalStdGift,totalBanners,totalMonths,
            targetCards,charMap,bannerStats,avgPullsPerCard,avgTargetPulls,avgStdPulls,
            avgDiaPerCard,avgDiaPerTarget,avgDiaPerStd,avgDiaPerPull,
            avgGiftPerCard,avgGiftPerTarget,avgGiftPerStd,avgGiftPerPull,avgGiftPerBanner,avgDiaPerBanner,
            avgDiaPerMonth,avgGiftPerMonth,avgPullsPerMonth,avgCardsPerMonth,
            freeCards,maxDiaVal,maxDiaBanners,minDiaVal,minDiaBanners,
            maxGiftVal,maxGiftBanners,minGiftVal,minGiftBanners,
            dblYolks,boxes};
}

                <span class="chip">總抽 <b class="c-blue">${bs.pulls}</b></span>
                <span class="chip">得卡 <b style="color:var(--accent)">${bs.cards + bs.stdCards} 張</b> <span class="c-dim" style="font-size:.8em">目標 ${bs.cards} + 常駐 ${bs.stdCards}</span></span>
                ${(bs.cards||bs.stdCards)?`<span class="chip">平均 <b class="c-green">${bs.pullsPerCard} 抽/張</b> <span class="c-dim" style="font-size:.8em">目標 ${bs.pullsPerTarget} + 常駐 ${bs.pullsPerStd}</span></span>`:''}
                <span class="chip">鑽石 <b class="c-red">💎 ${bs.dia.toLocaleString()}</b></span>
                ${(bs.cards||bs.stdCards)?`<span class="chip">單卡鑽石 <b class="c-red">💎 ${bs.costPerCard.toLocaleString()}</b> <span class="c-dim" style="font-size:.8em">目標 ${bs.costPerTarget.toLocaleString()} + 常駐 ${bs.costPerStd.toLocaleString()}</span></span>`:''}
                <span class="chip">禮包 <b class="c-yellow">💰 ${bs.gift.toLocaleString()}</b></span>
                ${(bs.cards||bs.stdCards)?`<span class="chip">單卡禮包 <b class="c-yellow">💰 ${bs.giftPerCard.toLocaleString()}</b> <span class="c-dim" style="font-size:.8em">均分</span></span>`:''}
            </div>`;
        }
        h += `</div>`;
    }
    h += `</div></div></div>`;

    app.innerHTML = h;

    // --- 卡池明細篩選功能 ---
    document.querySelectorAll('.filter-bar .filter-btn').forEach(btn=>{
        btn.addEventListener('click',()=>{
            btn.parentElement.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
            btn.classList.add('active');
            let f = btn.dataset.f;
            document.querySelectorAll('.banner-card').forEach(card=>{
                card.style.display = (f==='all' || card.dataset.type===f) ? '' : 'none';
            });
        });
    });

    // --- 圖表區間篩選（共用連動）---
    var chartRange = 'all';
    var customFrom = 0, customTo = d.bannerStats.length - 1;
    var includeStd1 = false, includeStd2 = false;
    var includeStdPie1 = false, includeStdPie2 = false;

    // 填充自訂區間下拉選單（加上日期）
    var selFrom = document.getElementById('chartFrom');
    var selTo = document.getElementById('chartTo');
    d.bannerStats.forEach(function(b, i){
        var sn = b.name.length > 8 ? b.name.slice(0,8)+'…' : b.name;
        var dateShort = b.date.split('-')[0]; // 取起始日期如 '2025/7/3'
        var label = (i+1)+'. '+sn+' ('+dateShort+')';
        selFrom.innerHTML += '<option value="'+i+'">'+label+'</option>';
        selTo.innerHTML += '<option value="'+i+'">'+label+'</option>';
    });
    selTo.value = d.bannerStats.length - 1;

    // 設定日期 input 的預設值和範圍
    var dateFromInput = document.getElementById('dateFrom');
    var dateToInput = document.getElementById('dateTo');
    // 把 '2025/7/3' 轉成 '2025-07-03' 給 input[type=date]
    function toIsoDate(str){
        var p = str.split('/');
        return p[0]+'-'+(p[1].length<2?'0':'')+p[1]+'-'+(p[2].length<2?'0':'')+p[2];
    }
    // 把 '2025/7/3' 轉成 Date 物件
    function parseDate(str){
        var p = str.split('/');
        return new Date(parseInt(p[0]), parseInt(p[1])-1, parseInt(p[2]));
    }
    var firstDate = d.bannerStats[0].date.split('-')[0];
    var lastDate = d.bannerStats[d.bannerStats.length-1].date.split('-')[0];
    dateFromInput.value = toIsoDate(firstDate);
    dateToInput.value = toIsoDate(lastDate);

    function getFilteredData(){
        var bs = d.bannerStats;
        if(chartRange === 'all') return Object.assign({}, d, {bannerStats: bs});
        if(chartRange === 'half'){
            var n = Math.min(bs.length, Math.ceil(bs.length / 2));
            return Object.assign({}, d, {bannerStats: bs.slice(bs.length - n)});
        }
        if(chartRange === 'custom'){
            return Object.assign({}, d, {bannerStats: bs.slice(customFrom, customTo + 1)});
        }
        if(chartRange === 'dateRange'){
            var from = new Date(dateFromInput.value);
            var to = new Date(dateToInput.value);
            to.setHours(23,59,59); // 包含結束日當天
            var filtered = bs.filter(function(b){
                var startDate = parseDate(b.date.split('-')[0]);
                return startDate >= from && startDate <= to;
            });
            return Object.assign({}, d, {bannerStats: filtered});
        }
        // 年份
        return Object.assign({}, d, {bannerStats: bs.filter(function(b){ return b.date.split('/')[0] === chartRange; })});
    }

    function redrawAllCharts(){
        var fd = getFilteredData();
        chartInstances.forEach(function(c){ if(c) c.destroy(); });
        chartInstances[0] = drawChart1(fd, includeStd1);
        chartInstances[1] = drawChart2(fd);
        chartInstances[2] = drawChart25(fd, includeStd2);
        chartInstances[3] = drawChartPie(fd, includeStdPie1);
        chartInstances[4] = drawChartPieGift(fd, includeStdPie2);
    }

    // 區間按鈕事件
    document.querySelectorAll('.chart-range-btn').forEach(function(btn){
        btn.addEventListener('click', function(){
            document.querySelectorAll('.chart-range-btn').forEach(function(b){ b.classList.remove('active'); });
            btn.classList.add('active');
            chartRange = btn.dataset.range;
            document.getElementById('customRangeWrap').style.display = chartRange === 'custom' ? 'flex' : 'none';
            document.getElementById('dateRangeWrap').style.display = chartRange === 'dateRange' ? 'flex' : 'none';
            redrawAllCharts();
        });
    });

    // 自訂卡池下拉事件
    selFrom.addEventListener('change', function(){
        customFrom = parseInt(this.value);
        if(customFrom > customTo){ customTo = customFrom; selTo.value = customTo; }
        if(chartRange === 'custom') redrawAllCharts();
    });
    selTo.addEventListener('change', function(){
        customTo = parseInt(this.value);
        if(customTo < customFrom){ customFrom = customTo; selFrom.value = customFrom; }
        if(chartRange === 'custom') redrawAllCharts();
    });

    // 自訂日期事件
    dateFromInput.addEventListener('change', function(){
        if(chartRange === 'dateRange') redrawAllCharts();
    });
    dateToInput.addEventListener('change', function(){
        if(chartRange === 'dateRange') redrawAllCharts();
    });

    // 初次繪圖
    redrawAllCharts();

    // --- 開關功能（各自控制）---
    document.getElementById('togStd1').addEventListener('click', function(){
        includeStd1 = !includeStd1;
        this.classList.toggle('on', includeStd1);
        var fd = getFilteredData();
        if(chartInstances[0]) chartInstances[0].destroy();
        chartInstances[0] = drawChart1(fd, includeStd1);
    });
    document.getElementById('togStd2').addEventListener('click', function(){
        includeStd2 = !includeStd2;
        this.classList.toggle('on', includeStd2);
        var fd = getFilteredData();
        if(chartInstances[2]) chartInstances[2].destroy();
        chartInstances[2] = drawChart25(fd, includeStd2);
    });
    document.getElementById('togStdPie1').addEventListener('click', function(){
        includeStdPie1 = !includeStdPie1;
        this.classList.toggle('on', includeStdPie1);
        var fd = getFilteredData();
        if(chartInstances[3]) chartInstances[3].destroy();
        chartInstances[3] = drawChartPie(fd, includeStdPie1);
    });
    document.getElementById('togStdPie2').addEventListener('click', function(){
        includeStdPie2 = !includeStdPie2;
        this.classList.toggle('on', includeStdPie2);
        var fd = getFilteredData();
        if(chartInstances[4]) chartInstances[4].destroy();
        chartInstances[4] = drawChartPieGift(fd, includeStdPie2);
    });

    // --- 角色分析開關 ---
    renderCharGrid(d, false);
    var includeStdChar = false;
    document.getElementById('togStdChar').addEventListener('click', function(){
        includeStdChar = !includeStdChar;
        this.classList.toggle('on', includeStdChar);
        renderCharGrid(d, includeStdChar);
    });
}

function renderCharGrid(d, includeStd){
    const charOrder = ['沈星回','黎深','祁煜','秦徹','夏以晝'];
    const charColor = {'沈星回':'#fbbf24','黎深':'#34d399','祁煜':'#60a5fa','秦徹':'#f87171','夏以晝':'#a78bfa'};
    const charIcon2 = {'沈星回':'⭐️','黎深':'🍐','祁煜':'🐟','秦徹':'🐦‍⬛','夏以晝':'🍎'};
    let h = '';
    charOrder.forEach(ch=>{
        let c = d.charMap[ch];
        if(!c) return;
        let cards = includeStd ? c.cards + (c.stdCards||0) : c.cards;
        let pulls = includeStd ? c.pulls + (c.stdPulls||0) : c.pulls;
        let dia = includeStd ? c.dia + (c.stdDia||0) : c.dia;
        let gift = includeStd ? c.gift + Math.round((c.stdCards||0) * (d.totalGift/(d.totalCards+d.totalStd))) : c.gift;
        let avg = cards ? Math.round(pulls/cards) : 0;
        let avgD = cards ? Math.round(dia/cards) : 0;
        let avgG = cards ? Math.round(gift/cards) : 0;
        h += `<div class="char-card" style="border-color:${charColor[ch]}30">
            <div class="icon">${charIcon2[ch]}</div>
            <div class="name" style="color:${charColor[ch]}">${ch}</div>
            <div class="row"><span class="k">卡片數</span><span>${cards} 張${includeStd && c.stdCards ? ' <span class="c-dim" style="font-size:.9em">目標 '+c.cards+' + 常駐 '+(c.stdCards||0)+'</span>' : ''}</span></div>
            <div class="row"><span class="k">總抽數</span><span class="c-blue">${pulls.toLocaleString()}</span></div>
            <div class="row"><span class="k">平均幾抽出</span><span class="c-green">${avg} 抽</span></div>
            <div class="row" style="border-top:1px solid rgba(252,165,165,.15);padding-top:6px;margin-top:4px"><span class="k">總鑽石</span><span class="c-red">💎 ${dia.toLocaleString()}</span></div>
            <div class="row"><span class="k">單卡平均鑽</span><span class="c-red">💎 ${avgD.toLocaleString()}</span></div>
            <div class="row" style="border-top:1px solid rgba(251,191,36,.15);padding-top:6px;margin-top:4px"><span class="k">總禮包</span><span class="c-yellow">💰 ${gift.toLocaleString()}</span></div>
            <div class="row"><span class="k">單卡平均禮包</span><span class="c-yellow">💰 ${avgG.toLocaleString()}</span></div>
        </div>`;
    });
    document.getElementById('charGridWrap').innerHTML = h;
}

var chartInstances = [];

// 根據篩選後的 bannerStats 重新計算角色佔比資料
function buildCharMapFromFiltered(d){
    const charNames = {'⭐️':'沈星回','🍐':'黎深','🐟':'祁煜','🐦‍⬛':'秦徹','🍎':'夏以晝'};
    var nameSet = new Set(d.bannerStats.map(function(b){ return b.name; }));
    var cm = {};
    var filteredTotalCards = 0, filteredTotalStd = 0, filteredTotalGift = 0;
    banners.forEach(function(b){
        if(b.skip || !nameSet.has(b.name)) return;
        filteredTotalGift += (b.gift||0);
        var bTargetCards = 0;
        b.pulls.forEach(function(p, pi){
            var charKey = charNames[p.icon] || '其他';
            if(!cm[charKey]) cm[charKey] = {dia:0, gift:0, stdDia:0, stdCards:0};
            if(p.std){
                filteredTotalStd++;
                cm[charKey].stdCards++;
                cm[charKey].stdDia += p.dia;
            } else if(!p.extra){
                filteredTotalCards++;
                bTargetCards++;
                cm[charKey].dia += p.dia;
            }
        });
        // 禮包均分到目標卡角色
        if(b.gift > 0 && bTargetCards > 0){
            var gpc = Math.round(b.gift / bTargetCards);
            var charCount = {};
            b.pulls.forEach(function(p){
                if(!p.std && !p.extra){
                    var ck = charNames[p.icon] || '其他';
                    charCount[ck] = (charCount[ck]||0) + 1;
                }
            });
            Object.keys(charCount).forEach(function(ck){
                if(cm[ck]) cm[ck].gift += gpc * charCount[ck];
            });
        }
    });
    return {charMap:cm, totalCards:filteredTotalCards, totalStd:filteredTotalStd, totalGift:filteredTotalGift};
}

function getShortLabels(d){ return d.bannerStats.map(b=> b.name.length>6 ? b.name.slice(0,6)+'…' : b.name); }

function drawChart1(d, includeStd){
    const shortLabels = getShortLabels(d);
    const bs = d.bannerStats;
    const mode = includeStd ? '含常駐' : '僅目標';
    const cardsData = bs.map(b=> includeStd ? b.cards+b.stdCards : b.cards);
    return new Chart(document.getElementById('chartTrend'),{
        type:'bar',
        data:{
            labels: shortLabels,
            datasets:[
                {label:'抽數',data:bs.map(b=>b.pulls),backgroundColor:'rgba(96,165,250,.45)',borderColor:'#60a5fa',borderWidth:1,borderRadius:4,yAxisID:'y'},
                {label:'得卡數（'+mode+'）',data:cardsData,type:'line',borderColor:'#a78bfa',backgroundColor:'#a78bfa',pointRadius:4,pointBackgroundColor:'#a78bfa',tension:.3,yAxisID:'y1'},
            ]
        },
        options:{
            responsive:true,
            plugins:{title:{display:true,text:'每池抽數 & 得卡數（'+mode+'）',color:'#a5b4fc',font:{size:14}},legend:{labels:{color:'#8b8fa3'}}},
            scales:{
                x:{ticks:{color:'#666',maxRotation:45,font:{size:10}}},
                y:{title:{display:true,text:'抽數',color:'#60a5fa'},ticks:{color:'#60a5fa'},grid:{color:'rgba(255,255,255,.04)'}},
                y1:{position:'right',title:{display:true,text:'得卡',color:'#a78bfa'},ticks:{color:'#a78bfa'},grid:{drawOnChartArea:false}},
            }
        }
    });
}

function drawChart2(d){
    const shortLabels = getShortLabels(d);
    const bs = d.bannerStats;
    let cumDia=0;
    let cumData = bs.map(b=>{cumDia+=b.dia; return cumDia;});
    let cumGift=0;
    let cumGiftData = bs.map(b=>{cumGift+=b.gift; return cumGift;});
    return new Chart(document.getElementById('chartDiaTrend'),{
        type:'bar',
        data:{
            labels: shortLabels,
            datasets:[
                {label:'本期鑽石',data:bs.map(b=>b.dia),backgroundColor:'rgba(252,165,165,.35)',borderColor:'#fca5a5',borderWidth:1,borderRadius:4,yAxisID:'y'},
                {label:'本期禮包',data:bs.map(b=>b.gift),backgroundColor:'rgba(251,191,36,.3)',borderColor:'#fbbf24',borderWidth:1,borderRadius:4,yAxisID:'y'},
                {label:'累計鑽石',data:cumData,type:'line',borderColor:'#f87171',backgroundColor:'transparent',pointRadius:3,pointBackgroundColor:'#f87171',tension:.3,yAxisID:'y1'},
                {label:'累計禮包',data:cumGiftData,type:'line',borderColor:'#facc15',backgroundColor:'transparent',pointRadius:3,pointBackgroundColor:'#facc15',tension:.3,borderDash:[5,3],yAxisID:'y1'},
            ]
        },
        options:{
            responsive:true,
            plugins:{title:{display:true,text:'鑽石 & 禮包花費趨勢（含累計）',color:'#a5b4fc',font:{size:14}},legend:{labels:{color:'#8b8fa3'}}},
            scales:{
                x:{ticks:{color:'#666',maxRotation:45,font:{size:10}},stacked:false},
                y:{title:{display:true,text:'本期花費',color:'#fca5a5'},ticks:{color:'#fca5a5'},grid:{color:'rgba(255,255,255,.04)'}},
                y1:{position:'right',title:{display:true,text:'累計',color:'#fb923c'},ticks:{color:'#fb923c'},grid:{drawOnChartArea:false}},
            }
        }
    });
}

function drawChart25(d, includeStd){
    const shortLabels = getShortLabels(d);
    const bs = d.bannerStats;
    const mode = includeStd ? '含常駐' : '僅目標';
    const costData = bs.map(b=> includeStd ? b.costPerCard : b.costPerTarget);
    const giftCostData = bs.map(b=> includeStd ? b.giftPerCard : b.giftPerTarget);
    const pullsData = bs.map(b=> includeStd ? b.pullsPerCard : b.pullsPerTarget);
    return new Chart(document.getElementById('chartPerCard'),{
        type:'bar',
        data:{
            labels: shortLabels,
            datasets:[
                {label:'單卡鑽石成本',data:costData,backgroundColor:'rgba(249,168,212,.4)',borderColor:'#f9a8d4',borderWidth:1,borderRadius:4,yAxisID:'y'},
                {label:'單卡禮包成本',data:giftCostData,backgroundColor:'rgba(253,230,138,.35)',borderColor:'#fde68a',borderWidth:1,borderRadius:4,yAxisID:'y'},
                {label:'平均抽數/張',data:pullsData,type:'line',borderColor:'#6ee7b7',backgroundColor:'transparent',pointRadius:4,pointBackgroundColor:'#6ee7b7',tension:.3,yAxisID:'y1'},
            ]
        },
        options:{
            responsive:true,
            plugins:{title:{display:true,text:'單卡成本 & 平均抽數趨勢（'+mode+'）',color:'#a5b4fc',font:{size:14}},legend:{labels:{color:'#8b8fa3'}}},
            scales:{
                x:{ticks:{color:'#666',maxRotation:45,font:{size:10}}},
                y:{title:{display:true,text:'單卡成本',color:'#f9a8d4'},ticks:{color:'#f9a8d4'},grid:{color:'rgba(255,255,255,.04)'}},
                y1:{position:'right',title:{display:true,text:'抽數/張',color:'#6ee7b7'},ticks:{color:'#6ee7b7'},grid:{drawOnChartArea:false}},
            }
        }
    });
}

function drawChartPie(d, includeStd){
    const charOrder = ['沈星回','黎深','祁煜','秦徹','夏以晝'];
    const charColors = ['#fbbf24','#34d399','#60a5fa','#f87171','#a78bfa'];
    const mode = includeStd ? '含常駐' : '僅目標';
    // 從篩選後的卡池重新計算角色資料
    const f = buildCharMapFromFiltered(d);
    let pieData = charOrder.map(ch=>{
        let c = f.charMap[ch];
        if(!c) return 0;
        return includeStd ? c.dia + (c.stdDia||0) : c.dia;
    });
    return new Chart(document.getElementById('chartPie'),{
        type:'doughnut',
        data:{
            labels: charOrder.map((ch,i)=>ch+' (💎'+pieData[i].toLocaleString()+')'),
            datasets:[{
                data: pieData,
                backgroundColor: charColors.map(c=>c+'99'),
                borderColor: charColors,
                borderWidth:2, hoverOffset:8
            }]
        },
        options:{
            responsive:true,
            plugins:{
                title:{display:true,text:'各角色鑽石花費佔比（'+mode+'）',color:'#a5b4fc',font:{size:14}},
                legend:{position:'bottom',labels:{color:'#8b8fa3',padding:12,font:{size:11}}}
            }
        }
    });
}

function drawChartPieGift(d, includeStd){
    const charOrder = ['沈星回','黎深','祁煜','秦徹','夏以晝'];
    const charColors = ['#fbbf24','#34d399','#60a5fa','#f87171','#a78bfa'];
    const mode = includeStd ? '含常駐' : '僅目標';
    // 從篩選後的卡池重新計算角色資料
    const f = buildCharMapFromFiltered(d);
    let pieGiftData = charOrder.map(ch=>{
        let c = f.charMap[ch];
        if(!c) return 0;
        // 常駐的禮包用均分方式：常駐卡數 × 每張卡的禮包均分
        let total = f.totalCards + f.totalStd;
        return includeStd ? c.gift + (total ? Math.round((c.stdCards||0) * (f.totalGift/total)) : 0) : c.gift;
    });
    return new Chart(document.getElementById('chartPieGift'),{
        type:'doughnut',
        data:{
            labels: charOrder.map((ch,i)=>ch+' (💰'+pieGiftData[i].toLocaleString()+')'),
            datasets:[{
                data: pieGiftData,
                backgroundColor: charColors.map(c=>c+'99'),
                borderColor: charColors,
                borderWidth:2, hoverOffset:8
            }]
        },
        options:{
            responsive:true,
            plugins:{
                title:{display:true,text:'各角色禮包花費佔比（'+mode+'）',color:'#a5b4fc',font:{size:14}},
                legend:{position:'bottom',labels:{color:'#8b8fa3',padding:12,font:{size:11}}}
            }
        }
    });
}

// 回到頂端
document.getElementById('btnTop').addEventListener('click',function(){
    document.documentElement.scrollTop = 0;
    document.body.scrollTop = 0;
});
window.addEventListener('scroll',function(){
    var btn = document.getElementById('btnTop');
    if(window.scrollY > 400 || document.documentElement.scrollTop > 400){
        btn.classList.add('show');
    } else {
        btn.classList.remove('show');
    }
});

// 全域設定 Chart.js
Chart.defaults.responsive = true;
Chart.defaults.maintainAspectRatio = false;

// 視窗縮放時強制重繪所有圖表
window.addEventListener('resize', function(){
    Object.values(Chart.instances).forEach(function(chart){
        chart.resize();
    });
});

// 啟動
render();
